<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Quote Galau</title>
		<style>
			body {
				font-family: "Courier New", Courier, monospace;
				text-align: center;
				line-height: 2em;
				letter-spacing: 2px;
				word-spacing: 2px;
				color: white;
				background-color: rgb(175, 213, 104);
				background-image:
					linear-gradient(
						to bottom,
						rgba(138, 131, 131, 0.5),
						rgba(138, 131, 131, 0.25)
					),
					url(assets/images/mushroom.jpg);
				background-position: center;
				background-size: cover;
				background-attachment: fixed;
				min-height: 100vh;
			}

			h1 {
				font-size: 4em;
				line-height: 1em;
				font-style: italic;
				letter-spacing: 8px;
				text-decoration: none;
				text-transform: uppercase;
				/* text-shadow: 1px 2px 8px rgb(142, 172, 207); */
				background-image: linear-gradient(
					to right,
					rgba(0, 0, 0, 0.8),
					rgba(0, 0, 0, 0.4)
				);
				background-clip: text;
				color: transparent;
				filter: drop-shadow(0 0 12px lightyellow);
			}

			.quote {
				line-height: 2.75em;
				text-shadow: 1px 1px 6px rgb(0, 0, 0, 0.85);
				border: 16px solid rgba(0, 0, 0, 0.025);
				background-color: rgba(0, 0, 0, 0.4);
				border-radius: 16px;
				/* width: 550px;
				height: 150px; */
				max-width: 480px;
				margin: auto;
				padding: 24px;
			}

			.credit {
				font-size: smaller;
				text-transform: uppercase;
				border-top: 1px solid rgb(255, 255, 255, 0.2);
				width: 30%;
				margin: 36px auto;
				color: rgba(255, 255, 255, 0.8);
				text-shadow: 0 0 8px black;
			}

			span {
				/* text-decoration: line-through; */
				color: rgb(255, 92, 74);
			}
		</style>
	</head>
	<body>
		<h1>Fase Runtuh</h1>
		<div>
			<p class="quote">
				"Tak perlu khawatir, ku hanya <span>terluka</span>. <br />
				Terbiasa tuk pura-pura tertawa. <br />
				Namun, bolehkah sekali saja ku menangis? <br />
				Sebelum kembali membohongi diri."
			</p>
		</div>
		<p class="credit">-- Feby Putri feat. Fiersa Besari --</p>
	</body>
</html>
