<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Mencoba Multiple Background</title>
		<style>
			body {
				min-height: 100vh;
				font-family: Arial, Helvetica, sans-serif;
				background-color: grey;
			}

			.frame {
				width: 400px;
				height: 400px;
				border: 10px solid white;
				margin: auto;
				background-image:
					url(assets/images/frame.svg), url(assets/images/shalat.svg),
					radial-gradient(white, rgb(195, 197, 125));
				background-size: 90%, 125px, auto;
				background-repeat: no-repeat, no-repeat, no-repeat;
				background-position: center, center, 0;
			}

			h1 {
				text-align: center;
				color: white;
				font-family: "Courier New", Courier, monospace;
				font-size: 36px;
				text-shadow: 2px 2px 4px black;
			}
		</style>
	</head>
	<body>
		<h1>My Photo</h1>
		<div class="frame"></div>
	</body>
</html>
