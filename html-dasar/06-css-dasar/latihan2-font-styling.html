<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Quote Galau</title>
		<style>
			h1 {
				font-family: "Courier New", Courier, monospace;
				font-weight: bold;
				font-style: italic;
				letter-spacing: 4px;
				word-spacing: 4px;
				text-decoration: underline;
				text-decoration-style: wavy;
				text-decoration-skip-ink: none;
				text-transform: uppercase;
				color: rgb(85, 85, 85);
				text-shadow: 1px 2px 4px rgb(184, 184, 184);
				text-align: center;
				line-height: 2em;
			}
			.quote {
				font-family: "Courier New", Courier, monospace;
				letter-spacing: 2px;
				word-spacing: 4px;
				line-height: 2em;
				text-align: center;

				text-shadow: 1px 1px 1px grey;
			}
			span {
				text-decoration: line-through;
				color: grey;
			}
			.credit {
				font-family: "Courier New", Courier, monospace;
				font-size: smaller;
				text-transform: lowercase;
				color: grey;
				text-align: center;
				line-height: 2em;
			}
		</style>
	</head>
	<body>
		<h1>Fase Runtuh</h1>
		<p class="quote">
			"Tak perlu khawatir, ku hanya <span>terluka</span>. <br />
			Terbiasa tuk pura-pura tertawa. <br />
			Namun, bolehkah sekali saja ku menangis? <br />
			Sebelum kembali membohongi diri."
		</p>
		<p class="credit">- Feby Putri feat. Fiersa Besari</p>
	</body>
</html>
