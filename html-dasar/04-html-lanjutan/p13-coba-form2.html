<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba atribut form lain</title>
  </head>
  <body>
    <h1>Coba atribut form lain</h1>
    <form>
      <label for="nama"
        >Nama
        <input
          type="text"
          name="nama"
          id="nama"
          placeholder="Masukkan nama..."
          autocomplete="off"
          autofocus
          required
        />
      </label>
      <br />

      <h3>Hobby:</h3>
      <label for="hobi1">
        <input type="checkbox" name="hobi1" id="hobi1" value="olahraga" />
        Olahraga
      </label>
      <br />
      <label for="hobi2">
        <input type="checkbox" name="hobi2" id="hobi2" value="berenang" />
        Berenang
      </label>
      <br />
      <label for="hobi3">
        <input type="checkbox" name="hobi3" id="hobi3" value="mancing" />
        Mancing
      </label>
      <br />

      <h3>Jenis Kelamin</h3>
      <label for="pria">
        <input
          type="radio"
          name="jenis-kelamin"
          id="pria"
          value="pria"
          checked
        />
        Pria
      </label>
      <label for="wanita">
        <input type="radio" name="jenis-kelamin" id="wanita" value="wanita" />
        Wanita
      </label>
      <br /><br />
      <button type="submit">Kirim</button>
    </form>
  </body>
</html>
