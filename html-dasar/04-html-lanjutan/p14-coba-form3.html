<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba Tag Select & Textarea</title>
  </head>
  <body>
    <h3>Pilih Kota:</h3>
    <form>
      <select name="kota" id="kota">
        <option value="">-- Pilih Kota Anda --</option>
        <option value="jkt">Jakarta</option>
        <option value="bdg">Bandung</option>
        <option value="imy">Indramayu</option>
        <option value="dmk">Demak</option>
        <option value="smg">Semarang</option>
      </select>
      <br /><br />

      <h3>Riwayat Pendidikan:</h3>
      <textarea
        name="riwayat-pendidikan"
        id="riwayat-pendidikan"
        cols="50"
        rows="15"
        placeholder="Isi riwayat pendidikan Anda..."
      ></textarea>
      <br /><br />
      <button type="submit">Kirim</button>
    </form>
  </body>
</html>
