<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mencoba Merging Table</title>
  </head>
  <body>
    <h3>Merge Table</h3>
    <br />
    <table border="1" cellspacing="0" cellpadding="5">
      <tr>
        <td>1, 1</td>
        <td colspan="2">Merge col</td>
      </tr>
      <tr>
        <td rowspan="2">Merge row</td>
        <td>2, 2</td>
        <td>2, 3</td>
      </tr>
      <tr>
        <td>3, 2</td>
        <td>3, 3</td>
      </tr>
    </table>
  </body>
</html>
